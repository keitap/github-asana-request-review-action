version: "2"

run:
  timeout: 5m

output:
  formats:
    tab:
      path: stdout

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - exhaustive
    - durationcheck
    - errorlint
    - forbidigo
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - nakedret
    - nestif
    - nlreturn
    - noctx
    - nolintlint
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    goconst:
      # Test files repeat fixture literals (dates, logins, review states) where
      # extracting constants hurts readability more than it helps.
      ignore-tests: true
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - linters: [gosec]
        path: cmd/
        text: "G70[36]"

formatters:
  enable:
    - gofmt
    - gofumpt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
